

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple carousel · example</title>
    <style>
        /* just the basics — no extra decorations */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f0eaff;
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .card {
            max-width: 700px;
            width: 100%;
            background: white;
            border-radius: 2rem;
            padding: 2rem 1.5rem 2.5rem 1.5rem;
            box-shadow: 0 15px 30px #b9a6dd;
            text-align: center;
        }

        h2 {
            color: #2c2152;
            margin-bottom: 1.8rem;
            font-weight: 500;
            font-size: 2rem;
        }

        /* ---------- SIMPLE CAROUSEL ---------- */
        .carousel {
            display: flex;
            overflow-x: auto;
            gap: 1.2rem;
            scroll-snap-type: x mandatory;
            padding: 0.5rem 0.2rem 1.5rem 0.2rem;
            /* hide scrollbar if you want cleaner look (optional) */
            scrollbar-width: thin;
            scrollbar-color: #a58bd4 #e5d9ff;
        }

        /* for Chrome/Safari */
        .carousel::-webkit-scrollbar {
            height: 8px;
        }
        .carousel::-webkit-scrollbar-track {
            background: #e5d9ff;
            border-radius: 20px;
        }
        .carousel::-webkit-scrollbar-thumb {
            background: #a58bd4;
            border-radius: 20px;
        }

        .carousel-item {
            scroll-snap-align: start;
            flex: 0 0 auto;
            width: 220px;
            height: 150px;
            background: #7a62b5;
            border-radius: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: white;
            font-weight: bold;
            box-shadow: 0 8px 12px #9d87cf;
            border: 3px solid white;
        }

        /* make images fit (if you use real images) */
        .carousel-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 1.4rem;
        }

        .note {
            margin-top: 20px;
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .note a {
            border: 1px solid #7a62b5;
            border-radius: 10px;
            width: 80px;
            text-decoration: none;
            font-size: .9rem;
            padding: 2px 10px;
            margin-bottom: 2px;
            font-weight: bold;
        }
        a:hover {
            background: #7a62b5;
            color: white;
            border-color: #7a62b5;
            transition: 0.1s;

        }
    
    .control {
        margin-bottom: 10px; 
    }
    
    .control input {
        margin: 5px;
    }
    </style>
</head>
<body>
    <div class="card">
        <h2>🖼️ simple carousel</h2>

        <!-- === CAROUSEL (only HTML + CSS) === -->
        <div class="carousel">
            <!-- slide 1 (using colored divs with emoji – you can replace with <img> ) -->
            <div class="carousel-item"><img src="https://media.tenor.com/WQPetnkm6uYAAAAM/flight-flight-reacts.gif" id="item1"></div>
            <div class="carousel-item"><img src="https://media.tenor.com/DwUvzOBtTEUAAAAM/speed-ishowspeed.gif" id="item2"></div>
            <div class="carousel-item"><img src="https://media1.tenor.com/m/e6gf3Da-UW4AAAAd/ishowspeed-speed.gif" id="item3"></div>
            <div class="carousel-item"><img src="https://media1.tenor.com/m/_OFPuqj02HgAAAAC/baby-laugh-ai-baby.gif" id="item4"></div>
            <div class="carousel-item"><img src="https://media.tenor.com/B0piVWUiKaUAAAAM/patrick-drooling-patrick-star.gif" id="item5"></div>
            <div class="carousel-item"><img src="https://media1.tenor.com/m/SvY0xuXlnc8AAAAC/squidward-meme-looking-out-the-window.gif" id="item6"></div>
        </div>

        <div class="note">
            <a href="#item1">Slide 1</a>
            <a href="#item2">Slide 2</a>
            <a href="#item3">Slide 3</a>
            <a href="#item4">Slide 4</a>
            <a href="#item5">Slide 5</a>
            <a href="#item6">Slide 6</a>
        </div>
        
        <!-- short explanation -->
        <p style="margin-top: 1.5rem; color:#3c2d66; background:#f3ecff; padding:0.6rem; border-radius:3rem;">
            ✔️ <code>display: flex</code> + <code>overflow-x: auto</code> + <code>scroll-snap-type</code>
        </p>
    </div>
</body>
</html>
