<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Quiz</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: #f4f7f6;
      color: #333;
      line-height: 1.6;
    }

    nav {
      padding: 1rem 0;
    }

    nav ul {
      display: flex;
      justify-content: center;
      list-style: none;
    }

    nav ul li {
      margin: 0 20px;
    }

    nav ul li a {
      text-decoration: none;
      font-weight: bold;
      transition: color 0.3s;
    }

    main {
      max-width: 1000px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 25px;
    }

    .lab {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      text-align: center;
      transition: transform 0.3s ease;
    }

    .lab:hover {
      transform: translateY(-5px);
    }

    .lab h3 {
      margin-bottom: 15px;
      color: #2c3e50;
      border-bottom: 2px solid #3498db;
      display: inline-block;
      padding-bottom: 5px;
    }

    .lab img {
      width: 100%;
      height: auto;
      border-radius: 8px;
      display: block;
      background-color: #eee;
      min-height: 200px;
      object-fit: cover;
    }
  </style>
</head>
<body><nav>
    <div class="container">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="quiz.html">Quiz</a></li>
        <li><a href="lab.html">Lab</a></li>
        <li><a href="exam.html">Exam</a></li>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="upload.html">Upload</a></li>
      </ul>
    </div>
  </nav>
  
  
  <main>
    <div class="grid">
      <section class="lab">
        <h3>Activity 1</h3>
        <img src="Activity 1.jpg" alt="Activity 1">
        <a href="index (1).html" target="_blank" style="text-decoration: none;">Activity 1</a>
      </section>
      <section class="lab">
        <h3>Activity 2</h3>
        <img src="Activity 2.jpg" alt="Activity 2">
        <a href="two_sum (1).html" target="_blank" style="text-decoration: none">Activity 2</a>
      </section>
    </div>
  </main>
</body>
</html>
